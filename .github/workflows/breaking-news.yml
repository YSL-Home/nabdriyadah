name: Breaking News Scanner

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    concurrency:
      group: nabdriyadah-git-push
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git config pull.rebase false
          git config branch.main.rebase false
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Scanner les flux RSS breaking
        id: scan
        run: |
          node scripts/breaking-news-scan.mjs
          echo "changed=$(cat /tmp/breaking_changed 2>/dev/null || echo false)" >> $GITHUB_OUTPUT

      - name: Réécrire si breaking détectées
        if: steps.scan.outputs.changed == 'true'
        run: node scripts/rewrite-article.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          BREAKING_ONLY: "true"

      - name: Commit & push
        if: steps.scan.outputs.changed == 'true'
        run: bash scripts/git-safe-push.sh "breaking: $(date '+%H:%M')"
