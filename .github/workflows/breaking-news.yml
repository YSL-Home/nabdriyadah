name: 🚨 Breaking News Scanner

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: 🔍 Scanner les flux RSS breaking
        run: node scripts/breaking-news-scan.mjs

      - name: ✍️ Réécrire si nouvelles breaking détectées
        if: ${{ hashFiles('/tmp/breaking_changed') != '' }}
        run: |
          FLAG=$(cat /tmp/breaking_changed 2>/dev/null || echo "false")
          if [ "$FLAG" = "true" ]; then
            echo "Breaking news détectées — lancement de la réécriture..."
            BREAKING_ONLY=true node scripts/rewrite-article.mjs
          else
            echo "Aucune breaking news — pas de réécriture."
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📦 Commit et push si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Rien à committer."
          else
            git commit -m "breaking: nouvelles articles urgentes [skip ci]"
            git push
          fi
