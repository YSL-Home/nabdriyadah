name: Nabdriyadah Content Automation

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: breaking | full"
        required: false
        default: "breaking"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 : Breaking News — toutes les 5 minutes
  # Commit du contenu uniquement, AUCUN déploiement Cloudflare
  # ──────────────────────────────────────────────────────────────────────────
  breaking-news:
    name: Breaking News
    runs-on: ubuntu-latest
    concurrency:
      group: nabdriyadah-breaking
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git config pull.rebase false
          git config branch.main.rebase false
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Scan RSS
        id: scan
        run: |
          node scripts/breaking-news-scan.mjs
          echo "changed=$(cat /tmp/breaking_changed 2>/dev/null || echo false)" >> $GITHUB_OUTPUT

      - name: Rewrite breaking article
        if: steps.scan.outputs.changed == 'true'
        run: node scripts/rewrite-article.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          BREAKING_ONLY: "true"

      # Commit sans déclencher de build Cloudflare (le déploiement est géré par full-refresh)

      - name: Audit quotidien (images, traductions, sports)
        run: node scripts/daily-audit.mjs
        continue-on-error: true

      - name: Commit & push content only
        if: steps.scan.outputs.changed == 'true'
        run: |
          bash scripts/git-safe-push.sh "breaking: $(date '+%H:%M') [skip deploy]"

      - name: Notify on failure (Telegram)
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          MSG="❌ nabdriyadah — Breaking News FAILED%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}" > /dev/null
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 : Full Refresh — toutes les heures
  # Génère le contenu + BUILD Next.js + DÉPLOIE sur Cloudflare via wrangler
  # (ne consomme pas les build minutes Cloudflare)
  # ──────────────────────────────────────────────────────────────────────────
  full-refresh:
    name: Full Content Refresh + Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: nabdriyadah-full-refresh
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git config pull.rebase false
          git config branch.main.rebase false
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Rewrite articles
        run: node scripts/rewrite-article.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}

      - name: Backfill traductions EN/FR manquantes
        run: node scripts/backfill-translations.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
        continue-on-error: true

      - name: Fetch ESPN data (standings + fixtures)
        run: node scripts/fetch-espn.mjs
        continue-on-error: true

      - name: Fetch YouTube channel IDs
        run: node scripts/fetch-channel-ids.mjs --max-teams 50
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        continue-on-error: true

      - name: Fetch team videos (YouTube API)
        run: node scripts/fetch-team-videos.mjs
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        continue-on-error: true

      - name: Generate images
        run: node scripts/generate-images.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        continue-on-error: true

      - name: Score viral articles
        run: node scripts/score-viral-articles.mjs
        continue-on-error: true

      - name: Generate Google News sitemap
        run: node scripts/generate-sitemap-news.mjs
        continue-on-error: true


      - name: Audit quotidien (images, traductions, sports)
        run: node scripts/daily-audit.mjs
        continue-on-error: true

      - name: Auto-posting Facebook / Instagram / TikTok
        run: node scripts/post-to-social.mjs
        env:
          FACEBOOK_PAGE_ID:    ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          INSTAGRAM_USER_ID:   ${{ secrets.INSTAGRAM_USER_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          LEONARDO_API_KEY:        ${{ secrets.LEONARDO_API_KEY }}
          KLING_ACCESS_KEY:        ${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY:        ${{ secrets.KLING_SECRET_KEY }}
          YOUTUBE_CLIENT_ID:       ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:   ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        continue-on-error: true

      - name: Commit & push content
        run: |
          bash scripts/git-safe-push.sh "refresh: $(date '+%d/%m %H:%M')"

      # ── Build Next.js (sur GitHub Actions, pas Cloudflare) ───────────────
      - name: Build Next.js
        run: npm run build

      # ── Deploy sur Cloudflare Pages via wrangler (direct upload) ─────────
      # Ne consomme PAS les build minutes Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        if: env.CF_API_TOKEN != ''
        run: |
          npx wrangler pages deploy out/ \
            --project-name="${{ secrets.CF_PROJECT_NAME || 'nabdriyadah' }}" \
            --commit-dirty=true \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Notify on failure (Telegram)
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          MSG="❌ nabdriyadah — Full Refresh FAILED%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}" > /dev/null
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
