name: 🚀 Content Automation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  automate:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install dependencies
        run: npm install

      - name: 📰 Fetch news
        run: node scripts/fetch-news.mjs

      - name: ✍️ Rewrite articles
        run: node scripts/rewrite-article.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 🖼️ Generate article visuals
        run: node scripts/generate-article-images.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 🧹 Clean git cache
        run: |
          rm -rf node_modules .next out
          git rm -r --cached --ignore-unmatch node_modules .next out

      - name: 💾 Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"

          git add content/articles/seo-articles.json
          git add content/raw-news.json
          git add public/generated

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "auto: update articles and visuals"

          git pull --rebase origin main
          git push origin main
