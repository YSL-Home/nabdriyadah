name: Nabdriyadah Content Automation

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: breaking | full"
        required: false
        default: "breaking"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 : Breaking News — toutes les 5 minutes
  # Commit du contenu uniquement, AUCUN déploiement Cloudflare
  # ──────────────────────────────────────────────────────────────────────────
  breaking-news:
    name: Breaking News
    runs-on: ubuntu-latest
    concurrency:
      group: nabdriyadah-git-push
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git config pull.rebase false
          git config branch.main.rebase false
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Scan RSS
        id: scan
        run: |
          node scripts/breaking-news-scan.mjs
          echo "changed=$(cat /tmp/breaking_changed 2>/dev/null || echo false)" >> $GITHUB_OUTPUT

      - name: Rewrite breaking article
        if: steps.scan.outputs.changed == 'true'
        run: node scripts/rewrite-article.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          BREAKING_ONLY: "true"

      # Commit sans déclencher de build Cloudflare (le déploiement est géré par full-refresh)
      - name: Commit & push content only
        if: steps.scan.outputs.changed == 'true'
        run: |
          bash scripts/git-safe-push.sh "breaking: $(date '+%H:%M') [skip deploy]"

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 : Full Refresh — toutes les heures
  # Génère le contenu + BUILD Next.js + DÉPLOIE sur Cloudflare via wrangler
  # (ne consomme pas les build minutes Cloudflare)
  # ──────────────────────────────────────────────────────────────────────────
  full-refresh:
    name: Full Content Refresh + Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: nabdriyadah-git-push
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git config pull.rebase false
          git config branch.main.rebase false
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Rewrite articles
        run: node scripts/rewrite-article.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}

      - name: Fetch ESPN data (standings + fixtures)
        run: node scripts/fetch-espn.mjs
        continue-on-error: true

      - name: Fetch YouTube channel IDs
        run: node scripts/fetch-channel-ids.mjs --max-teams 50
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        continue-on-error: true

      - name: Fetch team videos (YouTube API)
        run: node scripts/fetch-team-videos.mjs
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        continue-on-error: true

      - name: Generate images
        run: node scripts/generate-images.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        continue-on-error: true

      - name: Commit & push content
        run: |
          bash scripts/git-safe-push.sh "refresh: $(date '+%d/%m %H:%M')"

      # ── Build Next.js (sur GitHub Actions, pas Cloudflare) ───────────────
      - name: Build Next.js
        run: npm run build

      # ── Deploy sur Cloudflare Pages via wrangler (direct upload) ─────────
      # Ne consomme PAS les build minutes Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        if: env.CF_API_TOKEN != ''
        run: |
          npx wrangler pages deploy out/ \
            --project-name="${{ secrets.CF_PROJECT_NAME || 'nabdriyadah' }}" \
            --commit-dirty=true \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
