name: 🚀 Auto Generate Content + Images

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install dependencies
        run: npm install

      - name: 📰 Fetch news
        run: npm run fetch:news

      - name: ✍️ Rewrite articles
        run: npm run rewrite:articles

      - name: 🖼️ Generate images
        run: npm run generate:images

      - name: 🧹 Remove generated dependencies from git tracking
        run: |
          rm -rf node_modules .next out
          git rm -r --cached --ignore-unmatch node_modules .next out
          git rm --cached --ignore-unmatch package-lock.json

      - name: 💾 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "auto: generate content + images" || echo "no changes"
          git push
