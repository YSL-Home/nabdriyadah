name: 🚀 Auto Generate Content + Images

on:
  schedule:
    - cron: "0 */6 * * *" # toutes les 6h
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le repo
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Installer Node.js
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Installer dépendances (IMPORTANT)
      - name: 📦 Install dependencies
        run: npm install

      # 4. Générer contenu (news + articles)
      - name: 📰 Generate content
        run: npm run fetch:news

      - name: ✍️ Rewrite articles
        run: npm run rewrite:articles

      # 5. Générer images + upload Cloudinary
      - name: 🖼️ Generate images
        run: npm run generate:images

      # 6. Commit automatique
      - name: 💾 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "auto: generate content + images" || echo "no changes"
          git push
