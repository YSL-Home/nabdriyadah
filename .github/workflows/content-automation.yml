name: Nabdriyadah Content Automation

on:
  schedule:
    - cron: "*/5 * * * *"   # breaking-news every 5 min
    - cron: "0 * * * *"     # full-refresh every hour
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: breaking | full"
        required: false
        default: "breaking"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ── Breaking news (every 5 min) ──────────────────────────────────────────────
  breaking-news:
    name: Breaking News
    runs-on: ubuntu-latest
    # Concurrency group: only one push job runs at a time.
    # The second job WAITS (cancel-in-progress: false) instead of being killed.
    concurrency:
      group: nabdriyadah-git-push
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pull latest BEFORE doing any work — avoids working on stale content
      - name: Sync with remote
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git pull origin main --no-rebase --no-edit

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Scan RSS
        id: scan
        run: |
          node scripts/breaking-news-scan.mjs
          echo "changed=$(cat /tmp/breaking_changed 2>/dev/null || echo false)" >> $GITHUB_OUTPUT

      - name: Rewrite breaking article
        if: steps.scan.outputs.changed == 'true'
        run: node scripts/rewrite-article.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          BREAKING_ONLY: "true"

      - name: Commit & push
        if: steps.scan.outputs.changed == 'true'
        run: bash scripts/git-safe-push.sh "breaking: $(date '+%H:%M')"

  # ── Full refresh (every hour) ────────────────────────────────────────────────
  full-refresh:
    name: Full Content Refresh
    runs-on: ubuntu-latest
    concurrency:
      group: nabdriyadah-git-push
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pull latest BEFORE doing any work
      - name: Sync with remote
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git pull origin main --no-rebase --no-edit

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Rewrite articles
        run: node scripts/rewrite-article.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}

      - name: Fetch ESPN data (standings + fixtures)
        run: node scripts/fetch-espn.mjs
        continue-on-error: true

      - name: Fetch team videos (YouTube)
        run: node scripts/fetch-team-videos.mjs
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        continue-on-error: true

      - name: Generate images
        run: node scripts/generate-images.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        continue-on-error: true

      - name: Commit & push
        run: bash scripts/git-safe-push.sh "refresh: $(date '+%d/%m %H:%M')"
