<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>نبض الرياضة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f7fa;
    }
    header {
      background: linear-gradient(135deg,#2563eb,#7c3aed);
      color: white;
      padding: 40px;
      text-align: center;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    .live {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h1>نبض الرياضة</h1>
  <p>أخبار - مباشر - فيديو - تحليلات</p>
</header>

<div class="container">

  <div class="card">
    <h3>🔥 خبر عاجل</h3>
    <p>برشلونة يفوز على ريال مدريد في الكلاسيكو</p>
  </div>

  <div class="card">
    <h3 class="live">🔴 مباشر</h3>
    <p>الهلال vs النصر — 2-1</p>
  </div>

  <div class="card">
    <h3>🎾 البادل</h3>
    <p>بطولة عربية جديدة تنطلق الأسبوع القادم</p>
  </div>

</div>

</body>
</html>
