<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Padel racket shape -->
  <ellipse cx="50" cy="40" rx="34" ry="36" fill="#1d4ed8" stroke="white" stroke-width="3"/>
  <!-- Grid lines horizontal -->
  <line x1="18" y1="30" x2="82" y2="30" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="40" x2="84" y2="40" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="18" y1="50" x2="82" y2="50" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Grid lines vertical -->
  <line x1="35" y1="6" x2="30" y2="74" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="4" x2="50" y2="76" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="6" x2="70" y2="74" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Handle -->
  <rect x="43" y="74" width="14" height="22" rx="4" fill="#93c5fd"/>
  <rect x="43" y="72" width="14" height="6" rx="2" fill="#1d4ed8"/>
</svg>
