<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Green fairway background -->
  <circle cx="50" cy="50" r="48" fill="#15803d"/>
  <!-- Golf ball -->
  <circle cx="50" cy="52" r="18" fill="white"/>
  <!-- Dimples -->
  <circle cx="44" cy="48" r="2" fill="#e5e7eb"/>
  <circle cx="52" cy="46" r="2" fill="#e5e7eb"/>
  <circle cx="58" cy="50" r="2" fill="#e5e7eb"/>
  <circle cx="50" cy="56" r="2" fill="#e5e7eb"/>
  <circle cx="42" cy="56" r="2" fill="#e5e7eb"/>
  <!-- Flag pole -->
  <line x1="50" y1="10" x2="50" y2="34" stroke="white" stroke-width="2.5"/>
  <!-- Flag -->
  <polygon points="50,10 70,18 50,26" fill="#ef4444"/>
</svg>
